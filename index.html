<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie App</title>
    <link rel="stylesheet" href="main/style.css">
</head>

<body>
    <p class="title">Movie App</p>
    <section class="container">
        <div class="movie-input">
            <input type="text" id="movieInput" placeholder="Enter movie name" required>
            <button id="getMovieBtn">Get Movie</button>
        </div>
    </section>
    <section class="container">
        <div id="movieResult">
            <p class="default-result">
                Please enter a movie name and click "Get Movie" to see the current movie information.
            </p>
        </div>
    </section>
    <script src="main/main.js"></script>
</body>

</html>
